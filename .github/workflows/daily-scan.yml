name: Daily Job Intelligence Scan

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scanner
        run: python scanner.py

      - name: Create GitHub Issue with report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "$(cat report_title.txt)" \
            --body-file report_body.txt
